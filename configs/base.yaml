environment: base
random_seed: 42
paths:
  raw_data: data/raw
  interim_data: data/interim
  processed_data: data/processed
  samples: data/samples
  outputs: outputs
  reports: reports
data_quality:
  quarantine_path: outputs/quarantine
  fail_on_schema_error: true
event_stream:
  provider: local-placeholder
  event_hub_namespace: null
  event_hub_name: product-events
azure:
  tenant_id_env: AZURE_TENANT_ID
  subscription_id_env: AZURE_SUBSCRIPTION_ID
  key_vault_uri_env: AZURE_KEY_VAULT_URI
  storage_account_name: null
  synapse_workspace_name: null
models:
  registry_name: local-placeholder
  deterministic_training: true
experiments:
  minimum_detectable_effect: null
  default_confidence_level: 0.95
genai:
  provider: azure-openai-placeholder
  endpoint_env: AZURE_OPENAI_ENDPOINT
  require_grounding: true
observability:
  log_level: INFO
  application_insights_connection_string_env: APPLICATIONINSIGHTS_CONNECTION_STRING
synthetic_data:
  product_name: NexaFlow
  default_profile: sample
  profiles:
    sample:
      user_count: 12
      simulation_start_date: "2025-01-01"
      simulation_end_date: "2025-03-31"
      output_dir: data/samples/nexaflow
    development:
      user_count: 250
      simulation_start_date: "2025-01-01"
      simulation_end_date: "2025-03-31"
      output_dir: data/raw/development-run
  timezone: UTC
  contract_version: "2026-06-milestone-2"
  output_formats:
    users: csv
    sessions: jsonl
    clickstream_events: jsonl
    feature_usage: csv
    subscriptions: csv
    experiment_assignments: csv
    customer_feedback: csv
