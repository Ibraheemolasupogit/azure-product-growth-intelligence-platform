name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install project
        run: make install

      - name: Lint
        run: make lint

      - name: Type check
        run: make type-check

      - name: Test
        run: make test

      - name: Generate temporary synthetic sample
        run: python3 -m product_growth_intelligence generate-data --profile sample --output-dir /tmp/nexaflow-ci-sample --overwrite

      - name: Verify sample ingestion
        run: python3 -m product_growth_intelligence ingest-batch --source data/samples/nexaflow --output-root /tmp/pgi-ci/interim --quality-root /tmp/pgi-ci/quality --run-id ci-sample --fixed-ingestion-time 2026-01-01T00:00:00Z --overwrite

      - name: Verify deterministic ingestion evidence
        run: make verify-ingestion-evidence

      - name: Verify deterministic funnel evidence
        run: make verify-funnel-evidence

      - name: Verify deterministic retention evidence
        run: make verify-retention-evidence

      - name: Verify deterministic churn evidence
        run: make verify-churn-evidence

      - name: Verify deterministic segmentation evidence
        run: make verify-segmentation-evidence

      - name: Verify deterministic recommendation evidence
        run: make verify-recommendation-evidence
